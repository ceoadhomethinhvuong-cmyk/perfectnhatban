name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAMECHEAP_HOST }}
          username: ${{ secrets.NAMECHEAP_USER }}
          key: ${{ secrets.NAMECHEAP_SSH_KEY }}
          port: ${{ secrets.NAMECHEAP_PORT }}
          script: |
            set -e
            cd ~/perfectnhatban.com

            # Preserve server .env (gitignored but must stay intact across pulls)
            cp .env .env.server.bak 2>/dev/null || true

            # Force-clean pull — prevents merge conflicts breaking the deploy
            git fetch origin main
            git reset --hard origin/main

            # Restore server .env (git reset --hard won't touch it since it's gitignored)
            if [ -f .env.server.bak ]; then cp .env.server.bak .env; fi

         

            # Copy public/ assets to domain root (Namecheap serves from project root)
            rsync -a --exclude='index.php' --exclude='storage' public/ ~/public_html/
            cp public/.htaccess ~/public_html/.htaccess

            php artisan optimize:clear
            php artisan config:cache
            # route:cache fails on closure-based routes — skip it gracefully
            php artisan route:cache 2>/dev/null || true
            php artisan view:cache

            chmod -R 755 storage bootstrap/cache